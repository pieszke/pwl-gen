<html>
  <head>
    <meta charset="utf-8" />
    <title>PWL editor</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");

      * {
        box-sizing: border-box;
        margin: 0;
        font-family: "roboto", sans-serif;
      }

      body {
        display: grid;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto 1fr;
        row-gap: 1.5rem;
        align-items: center;
        justify-content: center;
        align-content: center;
        padding: 10%;
        width: 100%;
        height: 100%;
      }

      header {
        grid-column: 1 / 3;
        text-align: center;
      }

      aside {
        display: grid;
        grid-template-columns: max-content 8ch;
        row-gap: 1rem;
        column-gap: 1ch;
        padding: 1rem;
        align-items: center;
        background-color: darkgrey;
      }

      aside > button {
        grid-column: 1 / 3;
      }

      footer {
        grid-column: 1 / 3;
        text-align: center;
      }

      canvas {
        border: 2px solid darkgrey;
        box-shadow: darkgray 0 0 1rem 0.5rem;
        width: 100%;
        height: 100%;
      }

      dialog:not([open]) {
        display: none;
      }

      dialog {
        margin: auto;
        display: grid;
        justify-items: center;
        gap: 0.5em;
      }

      dialog > section {
        display: flex;
        gap: 1ch;
        justify-content: center;
      }

      dialog > * {
        width: 100%;
      }

      textarea {
        resize: none;
        border: 2px solid darkgrey;
      }
      textarea:not([valid]) {
        border-color: crimson;
        box-shadow: inset 0 0 0.5ch red;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@latest/dist/chartjs-plugin-dragdata.min.js"></script>
    <script>
      // https://stackoverflow.com/a/75988895
      const debounce = (callback, wait) => {
        let timeoutId = null;
        return (...args) => {
          window.clearTimeout(timeoutId);
          timeoutId = window.setTimeout(() => {
            callback(...args);
          }, wait);
        };
      };
      const IMPORT_ACTION = Object.freeze({
        R: "Replace",
        A: "Append",
        M: "Mix",
      });
    </script>
  </head>
  <body>
    <header>
      <h1>PWL editor</h1>
      <p>
        To import existing data just copy and paste text or a file or use the
        <i>Import</i> button
      </p>
    </header>
    <aside>
      <button onclick="add_point()">Add point</button>
      <button onclick="import_dialog.showModal()">Import</button>
      <button onclick="clear_pwl()">Clear</button>
      <label for="xmin">X min value:</label>
      <input
        id="xmin"
        name="xmin"
        type="number"
        value="0"
        onchange="update_axis(event)"
      />
      <label for="xmax">X max value:</label>
      <input
        id="xmax"
        name="xmax"
        type="number"
        value="100"
        onchange="update_axis(event)"
      />
      <label for="ymin">Y min value:</label>
      <input
        id="ymin"
        name="ymin"
        type="number"
        value="0"
        onchange="update_axis(event)"
      />
      <label for="ymax">Y max value:</label>
      <input
        id="ymax"
        name="ymax"
        type="number"
        value="100"
        onchange="update_axis(event)"
      />
      <label for="snapping">Snapping:</label>
      <select name="snap" id="snapping" onchange="update_snap()">
        <option value="6">None</option>
        <option value="2">0.01</option>
        <option value="1">0.1</option>
        <option value="0">1</option>
      </select>
      <button id="export" onclick="export_data()">Export</button>
    </aside>
    <main>
      <canvas></canvas>
    </main>
    <footer>
      Made with love instead of AI by <b>pieszke</b> |
      <a
        href="https://github.com/pieszke/pwl-gen"
        target="_blank"
        rel="noopener noreferrer"
        >Github</a
      >
    </footer>

    <dialog id="edit_dialog">
      <h3>Edit point</h3>
      <hr />
      <section>
        <label for="dx">X:</label>
        <input id="dx" name="x" type="number" />
      </section>
      <section>
        <label for="dy">Y:</label>
        <input id="dy" name="y" type="number" />
      </section>
      <section>
        <button onclick="stop_edit(true)">Remove</button>
        <button onclick="stop_edit()">Save</button>
        <button onclick="close_dialog(this)">Close</button>
      </section>
    </dialog>

    <dialog id="import_dialog">
      <h3>Import points</h3>
      <hr />
      <textarea
        id="imported_data"
        cols="30"
        rows="10"
        onkeypress="import_keypress(this)"
        placeholder="Input your data here or paste text or a file"
      ></textarea>
      <section>
        <label for="action">Action:</label>
        <select
          name="action"
          id="action"
          onchange="import_update_offset_UI(this)"
        ></select>
      </section>
      <section>
        <label for="xoff">X offset:</label>
        <input id="xoff" name="xoff" type="number" disabled value="0" />
      </section>
      <section>
        <button onclick="import_data()">Import</button>
        <button onclick="close_dialog(this)">Close</button>
      </section>
    </dialog>

    <dialog id="export_dialog">
      <h3>Settings</h3>
      <hr />
      <section>
        <label for="scalex">X scale factor:</label>
        <input
          type="number"
          id="scalex"
          name="scalex"
          value="1"
          step="0.1"
          style="width: 9ch"
          onchange="update_exported()"
        />
      </section>
      <section>
        <label for="scaley">Y scale factor:</label>
        <input
          type="number"
          id="scaley"
          name="scaley"
          value="1"
          step="0.1"
          style="width: 9ch"
          onchange="update_exported()"
        />
      </section>
      <section>
        <label for="sep">Format:</label>
        <select name="format" id="format" onchange="update_exported()">
          <option value="  ">Space</option>
          <option
            value=" 
          "
          >
            Space+Newline
          </option>
          <option
            value=",
          "
          >
            Comma+Newline
          </option>
        </select>
      </section>
      <h3>Exported data</h3>
      <textarea
        id="exported_data"
        cols="20"
        rows="10"
        readonly
        valid
      ></textarea>
      <section>
        <button onclick="copy_to_clipboard()">Copy</button>
        <button onclick="export_file()">Save to file</button>
        <button onclick="close_dialog(this)">Close</button>
      </section>
    </dialog>
  </body>

  <script>
    const edit_dialog = document.getElementById("edit_dialog");

    const import_dialog = document.getElementById("import_dialog");
    const imported_data = document.getElementById("imported_data");

    const export_dialog = document.getElementById("export_dialog");
    const exported_data = document.getElementById("exported_data");

    const canvas = document.querySelector("canvas");
    const ctx = canvas.getContext("2d");

    // https://stackoverflow.com/a/26984690
    function dialog_exit_outside(e) {
      if (e.target !== e.currentTarget) return; // fix to ignore clicks on objects inside
      let rect = e.target.getBoundingClientRect();
      let isInDialog =
        rect.top <= e.clientY &&
        e.clientY <= rect.top + rect.height &&
        rect.left <= e.clientX &&
        e.clientX <= rect.left + rect.width;
      if (!isInDialog) {
        e.target.close();
      }
    }

    function close_dialog(button) {
      button.closest("dialog").close();
    }

    let edit_idx = null;

    function x_range() {
      return {
        min: parseInt(document.getElementById("xmin").value),
        max: parseInt(document.getElementById("xmax").value),
      };
    }

    function y_range() {
      return {
        min: parseInt(document.getElementById("ymin").value),
        max: parseInt(document.getElementById("ymax").value),
      };
    }

    const chart = new Chart(ctx, {
      type: "line",
      data: {},
      options: {
        responsive: false,
        maintainAspectRatio: false,
        scales: {
          x: {
            type: "linear",
            position: "bottom",
            ...x_range(),
          },
          y: {
            type: "linear",
            position: "left",
            ...y_range(),
          },
        },
        plugins: {
          dragData: {
            showTooltip: true, // show the tooltip while dragging [default = true]
            dragX: true, // also enable dragging along the x-axis.
            // snap to data points or a grid (see options below)
            onDrag: function (event, datasetIndex, index, value) {
              if (
                value.x <
                  chart.data.datasets[datasetIndex].data[index - 1]?.x ||
                value.x > chart.data.datasets[datasetIndex].data[index + 1]?.x
              )
                return false;
            },
          },
          legend: {
            display: false,
          },
          tooltip: {
            enabled: true,
            callbacks: {
              label: function (context) {
                return `x: ${context.parsed.x.toFixed(3)}, y: ${context.parsed.y.toFixed(3)}`;
              },
              title: (x) => "",
            },
          },
        },
        onHover: (evt, item) => {
          if (item.length > 0) edit_idx = item[0].index;
          else edit_idx = null;
        },
      },
    });

    function extend_axis(scales) {
      let diff = scales.max - scales.min;
      // use log to determine how much to extend the axis
      let log = Math.floor(Math.log10(diff));
      scales.max = (Math.floor(scales.max / 10 ** log) + 1) * 10 ** log;
      scales.min = (Math.floor(scales.min / 10 ** log) - 1) * 10 ** log;
    }

    function sync_axis_inputs() {
      document.getElementById("xmin").value = chart.options.scales.x.min;
      document.getElementById("xmax").value = chart.options.scales.x.max;
      document.getElementById("ymin").value = chart.options.scales.y.min;
      document.getElementById("ymax").value = chart.options.scales.y.max;
    }

    function update_chart(resize = false) {
      if (resize) {
        // update axis values to fit the new data
        chart.options.scales.x.min = chart.data.datasets[0].data[0].x;
        chart.options.scales.x.max = chart.data.datasets[0].data[0].x;
        chart.options.scales.y.min = chart.data.datasets[0].data[0].y;
        chart.options.scales.y.max = chart.data.datasets[0].data[0].y;

        for (let pt of chart.data.datasets[0].data) {
          if (pt.x < chart.options.scales.x.min)
            chart.options.scales.x.min = pt.x;
          else if (pt.x > chart.options.scales.x.max)
            chart.options.scales.x.max = pt.x;
          if (pt.y < chart.options.scales.y.min)
            chart.options.scales.y.min = pt.y;
          else if (pt.y > chart.options.scales.y.max)
            chart.options.scales.y.max = pt.y;
        }
        extend_axis(chart.options.scales.x);
        extend_axis(chart.options.scales.y);
        sync_axis_inputs();
      }

      chart.update();
    }

    function add_point() {
      last = chart.data.datasets[0].data.slice(-1)[0];
      x_sc = chart.options.scales.x;
      new_obj = { x: last.x + (x_sc.max - x_sc.min) / 10, y: last.y };
      chart.data.datasets[0].data.push(new_obj);
      update_chart(true);
    }

    function clear_pwl() {
      chart.data = {
        datasets: [
          {
            label: "PWL",
            data: [
              { x: 0, y: 0 },
              { x: 80, y: 80 },
            ],
            borderColor: "blue",
            fill: false,
          },
        ],
      };
      update_chart(true);
    }

    function update_axis(e) {
      let axis = e.target.name[0];
      let attr = e.target.name.slice(1);
      chart.options.scales[axis][attr] = parseFloat(e.target.value);
      update_chart();
    }

    function update_snap() {
      chart.options.plugins.dragData.round = parseInt(
        document.getElementById("snapping").value,
      );
    }

    function stop_edit(remove = false) {
      if (edit_dialog.dataset.idx === undefined) {
        edit_dialog.close();
        return;
      }
      if (remove) {
        if (chart.data.datasets[0].data.length <= 2) {
          alert("Can't remove point. At least 2 points are required.");
          return;
        }
        chart.data.datasets[0].data.splice(edit_dialog.dataset.idx, 1);
      } else {
        let edit_obj = {
          x: parseFloat(edit_dialog.querySelector("#dx").value),
          y: parseFloat(edit_dialog.querySelector("#dy").value),
        };
        chart.data.datasets[0].data[edit_dialog.dataset.idx] = edit_obj;
        chart.data.datasets[0].data.sort((a, b) => a.x - b.x);
      }
      update_chart(true);
      edit_dialog.close();
      edit_dialog.dataset.idx = undefined;
    }

    function update_exported() {
      const scalex = parseFloat(document.getElementById("scalex").value);
      const scaley = parseFloat(document.getElementById("scaley").value);
      fmt = document.getElementById("format").value;
      const data = chart.data.datasets[0].data
        .map(
          (point) =>
            `${(point.x * scalex).toFixed(3)}${fmt[0]}${(point.y * scaley).toFixed(3)}`,
        )
        .join(fmt[1]);
      exported_data.value = data;
    }

    function export_data() {
      update_exported();
      export_dialog.showModal();
    }

    function export_file() {
      const a = document.createElement("a");
      const file = new Blob([exported_data.value], {
        type: "text/plain",
      });
      a.href = URL.createObjectURL(file);
      a.download = "pwl_data.txt";
      a.click();
    }

    const parser = new RegExp(
      /((\d+(?:\.\d+)?)[, \t]+?(\d+(?:\.\d+)?),?)/,
      "gm",
    );

    function is_import_text_valid(text) {
      if (text.length === 0) return false;
      let test = text.replaceAll(parser, "").trim();
      return test.length === 0;
    }

    function test_textarea_validity(textarea) {
      if (is_import_text_valid(textarea.value))
        textarea.setAttribute("valid", "");
      else textarea.removeAttribute("valid");
    }

    const import_keypress = debounce(test_textarea_validity, 500);

    function import_update_offset_UI(select) {
      const action = select.value;
      const xoff_input = document.getElementById("xoff");
      xoff_input.disabled = action === IMPORT_ACTION.R;
      if (action === IMPORT_ACTION.A) {
        select.title = "Append data after existing data";
        xoff_input.title = "Offset of new data '0' from last point";
      } else if (action === IMPORT_ACTION.M) {
        select.title = "Mix data with existing data";
        xoff_input.title = "Offset between zeros of new and existing data";
      } else {
        select.title = "Replace existing data with new data";
        xoff_input.title = "";
      }
    }

    function import_data() {
      if (
        !is_import_text_valid(imported_data.value) &&
        !confirm(
          `Invalid data.\nLeft from parsing: '${imported_data.value.replaceAll(parser, "").trim()}'\nImport anyway?`,
        )
      )
        return;
      let data = Array.from(
        imported_data.value.matchAll(parser).map((match) => ({
          x: parseFloat(match[2]),
          y: parseFloat(match[3]),
        })),
      );
      let rising = data.toSorted((a, b) => a.x - b.x);
      if (rising.some((pt, i) => pt.x !== data[i].x || pt.y !== data[i].y)) {
        if (confirm("Points are not in order. They will be sorted by x value."))
          data = rising;
        else return;
      }
      let off = parseFloat(document.getElementById("xoff").value);
      const action = document.getElementById("action").value;
      switch (action) {
        case IMPORT_ACTION.R:
          chart.data.datasets[0].data = data;
          console.log(chart.data.datasets[0].data);
          break;
        case IMPORT_ACTION.A:
          off += chart.data.datasets[0].data.at(-1).x;
          chart.data.datasets[0].data.push(
            ...data.map((d) => ({ x: d.x + off, y: d.y })),
          );
          break;
        case IMPORT_ACTION.M:
          chart.data.datasets[0].data.push(
            ...data.map((d) => ({ x: d.x + off, y: d.y })),
          );
          chart.data.datasets[0].data.sort((a, b) => a.x - b.x);
          break;
      }
      update_chart(true);
      import_dialog.close();
    }

    async function copy_to_clipboard() {
      try {
        await navigator.clipboard.writeText(exported_data.value);
        alert("Copied to clipboard!");
      } catch (err) {
        alert("Failed to copy: " + err);
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("action").innerHTML = Object.values(IMPORT_ACTION)
        .map((value) => `<option value="${value}">${value}</option>`)
        .join("");

      clear_pwl();

      document.querySelectorAll("dialog").forEach((dialog) => {
        dialog.addEventListener("click", dialog_exit_outside);
      });

      canvas.addEventListener("contextmenu", (e) => {
        if (edit_idx === null) return;
        e.preventDefault();
        edit_dialog.dataset.idx = edit_idx;
        edit_obj = chart.data.datasets[0].data[edit_idx];
        edit_dialog.querySelector("#dx").value = edit_obj.x;
        edit_dialog.querySelector("#dy").value = edit_obj.y;
        edit_dialog.showModal();
      });

      window.addEventListener("paste", async (e) => {
        if (import_dialog.open && imported_data.value !== "") return;
        let text = "";
        if (e.clipboardData.types.includes("text/plain"))
          text = e.clipboardData.getData("text/plain");
        else if (e.clipboardData.files.length > 0) {
          const file = e.clipboardData.files[0];
          if (file.type.startsWith("text/")) {
            text = await file.text();
          } else {
            alert("Pasted file is not a text file.");
            return;
          }
        } else {
          alert("Clipboard does not contain text data.");
          return;
        }
        imported_data.value = text;
        test_textarea_validity(imported_data);
        import_dialog.showModal();
        e.preventDefault();
      });
    });
  </script>
</html>
